name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 这个版本完美匹配：Dart 3.5.0 + intl 0.18.1
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.3"

      # 强制把项目intl改成0.18.1（一次性解决所有冲突）
      - name: Force intl to 0.18.1
        run: |
          sed -i 's/intl: .*/intl: 0.18.1/' pubspec.yaml
        working-directory: ./simple_live_app

      - name: flutter pub get
        run: flutter pub get
        working-directory: ./simple_live_app

      - name: Build APK
        run: flutter build apk --release
        working-directory: ./simple_live_app

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk
          path: simple_live_app/build/app/outputs/flutter-apk/app-release.apk
