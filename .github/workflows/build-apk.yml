name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.0'

      # 关键：进入 simple_live 目录
      - name: Install dependencies
        run: flutter pub get
        working-directory: ./simple_live

      - name: Build APK
        run: flutter build apk --release
        working-directory: ./simple_live

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk
          path: simple_live/build/app/outputs/flutter-apk/app-release.apk
