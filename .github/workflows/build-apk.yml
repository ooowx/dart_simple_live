name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 这个版本是真正能跑的！
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.10.0"

      # 强制把项目 intl 改成 0.18.1，完美匹配 Flutter 3.10.0
      - name: Force fix intl version
        run: |
          sed -i 's/intl: .*/intl: 0.18.1/' pubspec.yaml
        working-directory: ./simple_live_app

      - name: flutter pub get
        run: flutter pub get
        working-directory: ./simple_live_app

      - name: Build APK
        run: flutter build apk --release
        working-directory: ./simple_live_app

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk
          path: simple_live_app/build/app/outputs/flutter-apk/app-release.apk
